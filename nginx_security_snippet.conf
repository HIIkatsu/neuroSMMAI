# Include inside your server block.
#
# IMPORTANT: uvicorn must be started with --proxy-headers --forwarded-allow-ips="127.0.0.1"
# so that request.client.host returns the real client IP instead of 127.0.0.1.
# See DEPLOYMENT.md and deploy/neurosmm.service for the full startup command.

limit_req_zone $binary_remote_addr zone=neurosmm_api:10m rate=8r/s;

location /api/ {
    limit_req zone=neurosmm_api burst=20 nodelay;

    proxy_pass http://127.0.0.1:8000;

    # Pass real client IP to uvicorn — required for rate limiting and
    # YooKassa webhook IP whitelist verification.
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Serve static frontend assets directly from nginx (optional, but faster).
# If you prefer uvicorn to serve them, remove this block.
location / {
    proxy_pass http://127.0.0.1:8000;

    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /docs { return 404; }
location = /redoc { return 404; }
location = /openapi.json { return 404; }

location ~* ^/(\.env|graphql|admin|login|register|signup|config|stripe|oauth) {
    return 444;
}
